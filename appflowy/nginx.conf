# AppFlowy internal nginx — proxies to Docker services
# Listens on port 80 inside container (mapped to 8025 on host)
# Belagent nginx at /appflowy/ strips prefix and forwards here
#
# Uses $variable + resolver pattern so nginx starts even if
# upstream containers aren't ready yet (Docker DNS resolves them).

events {
    worker_connections 256;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    server {
        listen 80;
        server_name _;

        # Docker internal DNS — resolve container names dynamically
        resolver 127.0.0.11 valid=10s;
        resolver_timeout 5s;

        # ── API ──────────────────────────────────────────
        location /api/ {
            set $backend_cloud http://appflowy_cloud:8000;
            proxy_pass $backend_cloud;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # ── WebSocket (real-time collaboration) ──────────
        location /ws/ {
            set $backend_ws http://appflowy_cloud:8000;
            proxy_pass $backend_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # ── GoTrue (auth) ───────────────────────────────
        location /gotrue/ {
            set $backend_gotrue http://gotrue:9999;
            proxy_pass $backend_gotrue/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── MinIO API (presigned URLs for file uploads) ──
        location /minio-api/ {
            set $backend_minio http://minio:9000;
            proxy_pass $backend_minio/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            client_max_body_size 256M;
        }

        # ── Web UI (default) ────────────────────────────
        location / {
            set $backend_web http://appflowy_web:80;
            proxy_pass $backend_web;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
