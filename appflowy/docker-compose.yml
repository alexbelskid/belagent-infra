# AppFlowy Cloud — Minimal Self-Hosted Stack for Belagent
# Drops optional services (AI, search, worker) to stay within ~1GB RAM.
# Runs behind belagent nginx on port 8025 (not 80).
#
# Usage:
#   cp .env.example .env   # then fill in secrets
#   docker compose up -d
#   docker compose ps

services:
  # ── PostgreSQL (pgvector for vector search) ────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "127.0.0.1:15432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-appflowy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-appflowy}
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - af_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appflowy}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appflowy_net

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:16379:6379"
    volumes:
      - af_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - appflowy_net

  # ── MinIO (S3-compatible object storage) ───────────────────
  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:19000:9000"
      - "127.0.0.1:19001:9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY:?Set AWS_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET:?Set AWS_SECRET}
    volumes:
      - af_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appflowy_net

  # ── GoTrue (authentication service) ────────────────────────
  gotrue:
    image: appflowyinc/gotrue:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:19999:9999"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      GOTRUE_DATABASE_URL: postgres://${POSTGRES_USER:-appflowy}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-appflowy}?search_path=auth

      # JWT
      GOTRUE_JWT_SECRET: ${GOTRUE_JWT_SECRET:?Set GOTRUE_JWT_SECRET}
      GOTRUE_JWT_EXP: ${GOTRUE_JWT_EXP:-604800}
      GOTRUE_JWT_ADMIN_GROUP_NAME: supabase_admin

      # URLs
      API_EXTERNAL_URL: ${SCHEME:-http}://${FQDN:-localhost}/gotrue
      GOTRUE_SITE_URL: ${SCHEME:-http}://${FQDN:-localhost}

      # Registration
      GOTRUE_MAILER_AUTOCONFIRM: ${GOTRUE_MAILER_AUTOCONFIRM:-true}
      GOTRUE_DISABLE_SIGNUP: ${GOTRUE_DISABLE_SIGNUP:-true}
      GOTRUE_RATE_LIMIT_EMAIL_SENT: 100

      # Admin user (created on first boot)
      GOTRUE_ADMIN_EMAIL: ${GOTRUE_ADMIN_EMAIL:?Set GOTRUE_ADMIN_EMAIL}
      GOTRUE_ADMIN_PASSWORD: ${GOTRUE_ADMIN_PASSWORD:?Set GOTRUE_ADMIN_PASSWORD}

      # OAuth — all disabled by default
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: "false"
      GOTRUE_EXTERNAL_GITHUB_ENABLED: "false"
      GOTRUE_EXTERNAL_DISCORD_ENABLED: "false"
      GOTRUE_EXTERNAL_APPLE_ENABLED: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9999/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appflowy_net

  # ── AppFlowy Cloud (main backend) ──────────────────────────
  appflowy_cloud:
    image: appflowyinc/appflowy_cloud:latest
    restart: unless-stopped
    depends_on:
      gotrue:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      APPFLOWY_ENVIRONMENT: production
      RUST_LOG: ${RUST_LOG:-info}

      # Database
      APPFLOWY_DATABASE_URL: postgres://${POSTGRES_USER:-appflowy}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-appflowy}
      APPFLOWY_DATABASE_MAX_CONNECTIONS: ${APPFLOWY_DATABASE_MAX_CONNECTIONS:-20}

      # Redis
      APPFLOWY_REDIS_URI: redis://redis:6379

      # Auth
      APPFLOWY_GOTRUE_BASE_URL: http://gotrue:9999
      APPFLOWY_GOTRUE_JWT_SECRET: ${GOTRUE_JWT_SECRET}

      # S3 / MinIO
      APPFLOWY_S3_USE_MINIO: "true"
      APPFLOWY_S3_CREATE_BUCKET: "true"
      APPFLOWY_S3_MINIO_URL: http://minio:9000
      APPFLOWY_S3_ACCESS_KEY: ${AWS_ACCESS_KEY}
      APPFLOWY_S3_SECRET_KEY: ${AWS_SECRET}
      APPFLOWY_S3_BUCKET: ${APPFLOWY_S3_BUCKET:-appflowy}
      APPFLOWY_S3_REGION: us-east-1

      # Access control
      APPFLOWY_ACCESS_CONTROL: "true"

      # WebSocket
      APPFLOWY_WEBSOCKET_MAILBOX_SIZE: ${APPFLOWY_WEBSOCKET_MAILBOX_SIZE:-2000}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - appflowy_net

  # ── AppFlowy Web UI ────────────────────────────────────────
  appflowy_web:
    image: appflowyinc/appflowy_web:latest
    restart: unless-stopped
    depends_on:
      appflowy_cloud:
        condition: service_healthy
    networks:
      - appflowy_net

  # ── Nginx (AppFlowy internal reverse proxy) ────────────────
  # Listens on port 8025 — belagent nginx proxies /appflowy/ here
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${NGINX_PORT:-8025}:80"
    depends_on:
      appflowy_cloud:
        condition: service_healthy
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - appflowy_net

volumes:
  af_postgres_data:
  af_redis_data:
  af_minio_data:

networks:
  appflowy_net:
    driver: bridge
