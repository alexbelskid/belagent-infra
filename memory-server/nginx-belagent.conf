# /etc/nginx/sites-available/belagent
# Cloudflare tunnel → nginx (port 80) → upstream services
#
# Usage:
#   ln -s /etc/nginx/sites-available/belagent /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# Cloudflared config should point to http://localhost:80

upstream openclaw {
    server 127.0.0.1:19789;
}

upstream memory_api {
    server 127.0.0.1:3001;
}

server {
    listen 80 default_server;
    server_name _;

    # Memory API — routes to Express server
    location /api/memory/ {
        proxy_pass http://memory_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else — routes to OpenClaw gateway
    location / {
        proxy_pass http://openclaw;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (OpenClaw RPC)
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
